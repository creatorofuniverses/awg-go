name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o awg-go .

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          tarball="awg-go-${VERSION}-linux-${{ matrix.goarch }}.tar.gz"
          tar -czf "dist/${tarball}" \
            awg-go \
            awg-go.desktop \
            awg-go.service \
            README.md \
            docs/sudoers-awg-go
          ( cd dist && sha256sum "${tarball}" > "${tarball}.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: awg-go-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
